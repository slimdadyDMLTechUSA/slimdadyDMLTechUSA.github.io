<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DML TECH USA - Official Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #0a0a0a; color: #fff; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); padding: 20px; }
        .logo { font-size: 4rem; font-weight: 900; background: linear-gradient(45deg, #00f5ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .tagline { font-size: 1.5rem; color: #00f5ff; margin-bottom: 2rem; }
        .btn { padding: 15px 30px; background: #0066ff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; display: inline-block; }
        .btn:hover { background: #00f5ff; color: #000; transform: translateY(-2px); }
        .spider { font-size: 3rem; animation: float 3s ease-in-out infinite; margin-bottom: 1rem; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @media (max-width: 768px) { .logo { font-size: 2.5rem; } .tagline { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <div class="hero">
        <div>
            <div class="spider">🕷️</div>
            <h1 class="logo">DML TECH USA</h1>
            <p class="tagline">Innovation. Technology. Excellence.</p>
            <p style="margin-bottom: 2rem; color: #ccc;">Official US Branch of DML TECH</p>
            <a href="https://github.com/slimdadyDMLTechUSA" class="btn">Visit Our GitHub</a>
        </div>
    </div>
</body>
</html>
