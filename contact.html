<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - DML TECH USA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
        }
        .nav { 
            padding: 20px; 
            background: #111; 
            text-align: center;
            border-bottom: 2px solid #00f5ff;
            position: sticky;
            top: 0;
        }
        .nav a { 
            color: #00f5ff; 
            margin: 0 15px; 
            text-decoration: none; 
            font-weight: bold;
        }
        .nav a:hover { color: #fff; text-shadow: 0 0 10px #00f5ff; }
        .container { 
            max-width: 800px; 
            margin: 50px auto; 
            padding: 20px; 
        }
        h1 { 
            font-size: 3rem; 
            color: #00f5ff; 
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px #00f5ff;
        }
        .contact-box { 
            background: #111; 
            padding: 40px; 
            border-radius: 10px;
            border: 2px solid #0066ff;
            text-align: center;
        }
        .contact-box p { 
            font-size: 1.2rem; 
            margin: 20px 0; 
            color: #ccc; 
        }
        .btn {
            background: #00f5ff;
            color: #0a0a0a;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #0066ff;
            color: #fff;
            box-shadow: 0 0 20px #0066ff;
        }
        .spider { text-align: center; font-size: 2rem; margin: 20px 0; }
        .email { color: #00f5ff; font-size: 1.3rem; }

    <div class="nav">

    </div>
    <div class="container">
        <div class="spider">🕷️</div>
        <h1>Contact DML TECH USA</h1>
        <div class="contact-box">
            <p>Ready to build the future with us?</p>
            <p class="email">📧 contact@dmltechusa.com</p>
            <p>🌐 GitHub: github.com/slimdadyDMLTechUSA</p>
            <a href="mailto:contact@dmltechusa.com" class="btn">Send Email</a>
