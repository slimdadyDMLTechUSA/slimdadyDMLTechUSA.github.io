<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - DML TECH USA</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #111; padding: 30px; border-radius: 10px; border: 1px solid #333; }
    h1 { color: #00ff88; text-align: center; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; color: #00ff88; }
    input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 5px; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 15px; margin-top: 20px; background: #00ff88; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact DML TECH USA 🕷️</h1>
    <form action="https://formspree.io/f/xkoklapo" method="POST">
      <label>Your Name</label>
      <input type="text" name="name" required>
      
      <label>Your Email</label>
      <input type="email" name="email" required>
      
      <label>Phone Number</label>
      <input type="tel" name="phone">
      
      <label>Message</label>
      <textarea name="message" rows="6" required></textarea>
      
      <button type="submit">Send Message ⚡</button>
    </form>
  </div>
</body>
</html>
